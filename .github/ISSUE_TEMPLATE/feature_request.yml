name: Feature Request
description: Propose an improvement for Codex Feishu
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem are you trying to solve?
      placeholder: Explain the current limitation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or interface.
      placeholder: Explain what should be added or changed.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches did you consider?
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and what workflows improve?
      placeholder: "Example: local-first deployment, multi-project session routing, observability..."
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the roadmap, README, and existing issues first.
          required: true
        - label: This request is specific enough to be implemented and tested.
          required: true
