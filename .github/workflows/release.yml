name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release, e.g. v0.1.2. Manual dispatch refreshes GitHub Release assets only.'
        required: true
        type: string
      publish_npm:
        description: 'Also publish the selected tag to npm.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Validate package version matches tag
        run: |
          TAG='${{ steps.ref.outputs.tag }}'
          PACKAGE_VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"
          if [ "v${PACKAGE_VERSION}" != "${TAG}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match tag ${TAG}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build package
        run: npm run build

      - name: Publish to npm
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_npm == true)
        run: npm publish --access public

      - name: Pack release artifact
        run: npm pack

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          python3 - <<'PY' "${{ steps.ref.outputs.tag }}" "$GITHUB_OUTPUT"
          from pathlib import Path
          import re
          import sys

          tag = sys.argv[1]
          out = Path(sys.argv[2])
          text = Path('CHANGELOG.md').read_text(encoding='utf-8')
          pattern = re.compile(rf'^## {re.escape(tag)}(?:\\s+-\\s+.*)?$', re.M)
          match = pattern.search(text)
          if not match:
              out.open('a', encoding='utf-8').write('found=false\\n')
              raise SystemExit(0)
          start = match.end()
          next_match = re.search(r'^##\\s+', text[start:], re.M)
          end = start + next_match.start() if next_match else len(text)
          notes = text[start:end].strip()
          notes_path = Path('release-notes.md')
          notes_path.write_text(notes + '\\n', encoding='utf-8')
          with out.open('a', encoding='utf-8') as fh:
              fh.write('found=true\\n')
              fh.write(f'path={notes_path}\\n')
          PY

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag='${{ steps.ref.outputs.tag }}'
          asset=$(ls -1 *.tgz | head -n 1)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
            exit 0
          fi
          if [ '${{ steps.notes.outputs.found }}' = 'true' ]; then
            gh release create "$tag" "$asset" --title "$tag" --notes-file '${{ steps.notes.outputs.path }}'
          else
            gh release create "$tag" "$asset" --title "$tag" --generate-notes
          fi
