groups:
  - name: feique
    rules:
      - alert: FeiqueBridgeDown
        expr: up{job="feique"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: feique bridge is down
          description: Prometheus 无法抓取 feique 的 /metrics，持续 2 分钟。

      - alert: FeiqueNoIncomingMessages
        expr: time() - max(feique_last_incoming_message_timestamp_seconds) > 1800
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: feique has not received Feishu messages recently
          description: 最近 30 分钟内没有新的飞书消息进入桥接器，请检查长连接或 webhook 配置。

      - alert: FeiqueOutboundFailures
        expr: increase(feique_outbound_messages_total{status="failure"}[10m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: feique outbound Feishu sends are failing
          description: 最近 10 分钟内发生飞书出站发送失败，请检查 token、配额或网络。

      - alert: FeiqueCodexFailureRateHigh
        expr: |
          (
            sum(rate(feique_codex_turns_total{status="failure"}[15m]))
            /
            clamp_min(sum(rate(feique_codex_turns_total[15m])), 0.001)
          ) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: feique Codex failure rate is high
          description: 最近 15 分钟 Codex 执行失败率超过 20%，请检查 Codex CLI、工作区权限或上游服务。

      - alert: FeiqueCodexRunStuck
        expr: max(feique_active_codex_runs) > 0 and time() - max(feique_last_codex_success_timestamp_seconds) > 1800
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: feique has active Codex runs without recent success
          description: 有正在运行的 Codex 会话且最近 30 分钟没有成功完成，请检查是否卡死在命令、审批或网络阶段。
